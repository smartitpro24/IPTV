<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hotel Welcome</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
height:100vh;

/* Background Image */

background:url("hotel.jpg") no-repeat center center;
background-size:cover;
}

/* dark overlay */

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

/* welcome panel */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:850px;
background:rgba(0,0,0,0.65);
padding:50px;
border-radius:20px;
}

/* title */

h1{
font-size:70px;
letter-spacing:8px;
margin:0 0 20px 0;
}

/* text */

.text{
font-size:22px;
margin-bottom:40px;
line-height:32px;
}

/* language buttons */

.lang{
display:flex;
gap:20px;
}

.btn{
border:2px solid white;
padding:15px 40px;
font-size:22px;
cursor:pointer;
}

.btn.active{
background:white;
color:black;
}

/* clock */

.clock{
position:absolute;
top:40px;
right:60px;
font-size:22px;
text-align:right;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="clock">
<div id="time"></div>
<div id="date"></div>
</div>

<div class="container">

<h1>WELCOME</h1>

<div class="text">
Welcome to our hotel.  
Please choose your language.
</div>

<div class="lang">

<div class="btn active" onclick="selectLang('en')">English</div>

<div class="btn" onclick="selectLang('ru')">Russian</div>

<div class="btn" onclick="selectLang('bn')">Bangla</div>

</div>

</div>

<script>

/* language redirect */

function selectLang(lang){

if(lang=="en") location="dashboard_en.html";
if(lang=="ru") location="dashboard_ru.html";
if(lang=="bn") location="dashboard_bn.html";

}

/* clock */

function updateClock(){
let now=new Date();
document.getElementById("time").innerHTML=now.toLocaleTimeString();
document.getElementById("date").innerHTML=now.toDateString();
}

setInterval(updateClock,1000);

/* remote navigation */

let buttons=document.querySelectorAll(".btn");
let index=0;

document.addEventListener("keydown",function(e){

if(e.key=="ArrowRight") index=(index+1)%buttons.length;

if(e.key=="ArrowLeft") index=(index-1+buttons.length)%buttons.length;

if(e.key=="Enter") buttons[index].click();

buttons.forEach(b=>b.classList.remove("active"));
buttons[index].classList.add("active");

});

</script>

</body>
</html>
