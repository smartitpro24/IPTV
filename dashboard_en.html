<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hotel Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:url("hotel_bg.jpg") center/cover no-repeat;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.header{
position:absolute;
top:30px;
left:60px;
font-size:40px;
letter-spacing:4px;
}

.clock{
position:absolute;
top:30px;
right:60px;
font-size:22px;
text-align:right;
}

.menu{
position:absolute;
bottom:60px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

.box{
width:180px;
height:130px;
background:rgba(0,0,0,0.6);
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:22px;
cursor:pointer;
}

.box.active{
background:white;
color:black;
}

</style>
</head>

<body>
<video autoplay muted loop> <source src="https://www.youtube.com/watch?v=A5chlJzz0M0" type="video/mp4"> </video>
<div class="overlay"></div>

<div class="header">
WELCOME
</div>

<div class="clock">
<div id="time"></div>
<div id="date"></div>
</div>

<div class="menu">

<<div class="box active" onclick="openPage('live.html')"> LIVE TV </div>
<div class="box active" onclick="openPage('movie.html')"> MOVIES </div>
<div class="box"> MUSIC</div>
<div class="box">🏨 HOTEL INFO</div>
<div class="box">🍽 FOOD MENU</div>

</div>
<script>
function openPage(page){
window.location.href = page;
}
</script>
<script>

function clock(){
let n=new Date();
time.innerHTML=n.toLocaleTimeString();
date.innerHTML=n.toDateString();
}

setInterval(clock,1000);

let items=document.querySelectorAll(".box");
let index=0;

document.addEventListener("keydown",e=>{

if(e.key=="ArrowRight") index=(index+1)%items.length;

if(e.key=="ArrowLeft") index=(index-1+items.length)%items.length;

if(e.key=="Enter") alert(items[index].innerText);

items.forEach(i=>i.classList.remove("active"));
items[index].classList.add("active"); 

if(e.key=="Enter"){
items[index].click();
}
});

</script>

</body>
</html>
