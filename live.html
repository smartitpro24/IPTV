<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PRO IPTV Player</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  overflow:hidden;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PLAYLIST */
.playlist{
  position:absolute;
  left:0;
  top:0;
  width:320px;
  height:100%;
  background:rgba(0,0,0,0.85);
  overflow-y:auto;
  padding-top:20px;
  display:none;
}

.channel{
  padding:14px;
  color:white;
  font-size:17px;
  cursor:pointer;
}

.channel.active{
  background:white;
  color:black;
}

/* INFO */
.info{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:10px;
  display:none;
}

/* LOADING */
.loader{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:22px;
  display:none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="playlist" id="playlist"></div>
<div class="info" id="info"></div>
<div class="loader" id="loader">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const playlistUrl = "https://raw.githubusercontent.com/smartitpro24/IPTV/refs/heads/main/playlist.m3u8"

const video = document.getElementById("video")
const playlistDiv = document.getElementById("playlist")
const info = document.getElementById("info")
const loader = document.getElementById("loader")

let channels = []
let index = 0
let hideTimer
let hls
let retryCount = 0

// 📺 LOAD PLAYLIST
async function loadPlaylist(){
  try{
    const res = await fetch(playlistUrl)
    const text = await res.text()

    const lines = text.split("\n")

    for(let i=0;i<lines.length;i++){
      if(lines[i].startsWith("#EXTINF")){
        let name = lines[i].split(",")[1] || "Channel"
        let url = lines[i+1]
        channels.push({name,url})
      }
    }

    buildUI()

    if(channels.length > 0){
      playChannel(0)
    }

  }catch(e){
    showInfo("Playlist Load Error")
  }
}

// 🎯 BUILD UI
function buildUI(){
  channels.forEach((c,i)=>{
    let div = document.createElement("div")
    div.className = "channel"
    div.innerText = c.name
    div.onclick = ()=>playChannel(i)
    playlistDiv.appendChild(div)
  })
}

// ▶️ PLAY CHANNEL
function playChannel(i){
  index = i
  retryCount = 0
  startPlayer()
}

// 🔁 PLAYER ENGINE
function startPlayer(){

  showLoader(true)

  if(hls){
    hls.destroy()
  }

  if(Hls.isSupported()){
    hls = new Hls({
      maxBufferLength: 10,
      maxMaxBufferLength: 30,
      enableWorker: true
    })

    hls.loadSource(channels[index].url)
    hls.attachMedia(video)

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      safePlay()
    })

    hls.on(Hls.Events.ERROR, (event,data)=>{
      if(data.fatal){
        handleError()
      }
    })

  }else{
    video.src = channels[index].url
    safePlay()
  }

  highlight()
  showInfo(channels[index].name)
}

// ▶️ SAFE AUTOPLAY
function safePlay(){
  video.muted = true
  video.play().then(()=>{
    video.muted = false
    showLoader(false)
  }).catch(()=>{
    handleError()
  })
}

// ❌ HANDLE ERROR / RETRY
function handleError(){
  retryCount++

  if(retryCount < 2){
    setTimeout(()=>{
      startPlayer()
    },1000)
  }else{
    nextChannel()
  }
}

// ⏭ NEXT CHANNEL
function nextChannel(){
  index = (index + 1) % channels.length
  playChannel(index)
}

// 🎯 HIGHLIGHT
function highlight(){
  const items = document.querySelectorAll(".channel")

  items.forEach(c => c.classList.remove("active"))

  if(items[index]){
    items[index].classList.add("active")

    // ✅ AUTO SCROLL FIX
    items[index].scrollIntoView({
      behavior: "smooth",
      block: "center"
    })
  }
}

// 📺 PLAYLIST SHOW
function showPlaylist(){
  playlistDiv.style.display = "block"
  clearTimeout(hideTimer)
  hideTimer = setTimeout(()=>{
    playlistDiv.style.display = "none"
  },5000)
}

// 🔔 INFO
function showInfo(text){
  info.innerText = text
  info.style.display = "block"
  setTimeout(()=>info.style.display="none",2000)
}

// ⏳ LOADER
function showLoader(state){
  loader.style.display = state ? "block" : "none"
}

// 🎮 REMOTE CONTROL
document.addEventListener("keydown", e=>{

  showPlaylist()

  if(e.key === "ArrowDown"){
    index = (index + 1) % channels.length
    highlight()
  }

  if(e.key === "ArrowUp"){
    index = (index - 1 + channels.length) % channels.length
    highlight()
  }

  if(e.key === "Enter"){
    playChannel(index)
  }

})

// 📡 VIDEO ERROR FALLBACK
video.addEventListener("error", ()=>{
  handleError()
})

// 🚀 START
loadPlaylist()

</script>

</body>
</html>
